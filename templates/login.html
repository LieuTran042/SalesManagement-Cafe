{% extends "base.html" %}

{% block title %}Login - Coffee Shop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">

        <div class="card login-card shadow-lg border-0">
            <div class="card-body p-5">

                <!-- Logo -->
                <div class="text-center mb-4">
                    <i class="bi bi-cup-hot-fill coffee-icon"></i>
                    <h3 class="fw-bold mt-3">COFFEE SHOP</h3>
                    <p class="text-muted">Sign in to your account</p>
                </div>

                <!-- Inline Error Message -->
                {% if error %}
                <div class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div>{{ error }}</div>
                </div>
                {% endif %}

                <!-- Form -->
                <form method="POST" action="/">

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-person"></i> Username
                        </label>
                        <input type="text" name="username"
                               class="form-control form-control-lg"
                               placeholder="Enter your username"
                               value="{{ username or '' }}" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-lock"></i> Password
                        </label>
                        <input type="password" name="password" id="passwordInput"
                               class="form-control form-control-lg"
                               placeholder="Enter your password" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="remember" id="remember">
                            <label class="form-check-label" for="remember">
                                <small>Remember me (7 days)</small>
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="show"
                                   onclick="document.getElementById('passwordInput').type = this.checked ? 'text' : 'password'">
                            <label class="form-check-label" for="show">
                                <small>Show password</small>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-coffee w-100 btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">Don't have an account?</small>
                    <a href="/register" class="text-decoration-none fw-bold"> Sign up</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
